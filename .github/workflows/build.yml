name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone worker-comfyui
        run: git clone https://github.com/runpod-workers/worker-comfyui --depth 1 .

      - name: Patch Dockerfile to add custom nodes
        run: |
          python3 << 'PYEOF'
          import sys

          with open('Dockerfile', 'r') as f:
              content = f.read()

          lines = [
              '',
              '# Install custom nodes for LTX-Video pipeline',
              'RUN cd /comfyui/custom_nodes && \\',
              '    git clone https://github.com/Lightricks/ComfyUI-LTXVideo --depth 1 && \\',
              '    git clone https://github.com/Kosinkadink/ComfyUI-VideoHelperSuite --depth 1 && \\',
              '    git clone https://github.com/sipherxyz/comfyui-art-venture --depth 1 && \\',
              '    pip install -r ComfyUI-LTXVideo/requirements.txt',
              '',
          ]
          custom_nodes = '\n'.join(lines) + '\n'

          target = 'CMD ["/start.sh"]'
          if target in content:
              content = content.replace(target, custom_nodes + target)
              print("SUCCESS: Dockerfile patched")
          else:
              print("ERROR: CMD line not found in Dockerfile")
              for i, line in enumerate(content.split('\n')):
                  if 'CMD' in line or 'start.sh' in line:
                      print(f"  Line {i}: {repr(line)}")
              sys.exit(1)

          with open('Dockerfile', 'w') as f:
              f.write(content)

          if 'ComfyUI-LTXVideo' in content:
              print("VERIFIED: Custom nodes in Dockerfile")
          else:
              print("ERROR: Patch verification failed")
              sys.exit(1)
          PYEOF

      - name: Show patched Dockerfile section
        run: grep -A 8 "Install custom nodes" Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: havocxfriday/bloom-comfyui:latest
          target: base

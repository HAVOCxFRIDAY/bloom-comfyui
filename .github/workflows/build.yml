name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone worker-comfyui
        run: git clone https://github.com/runpod-workers/worker-comfyui --depth 1 .

      - name: Add custom nodes to Dockerfile
        run: |
          sed -i 's|CMD \["/start.sh"\]|RUN cd /comfyui/custom_nodes \&\& git clone https://github.com/Lightricks/ComfyUI-LTXVideo --depth 1 \&\& git clone https://github.com/Kosinkadink/ComfyUI-VideoHelperSuite --depth 1 \&\& git clone https://github.com/sipherxyz/comfyui-art-venture --depth 1 \&\& pip install -r ComfyUI-LTXVideo/requirements.txt\n\nCMD [\"/start.sh\"]|' Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: havocxfriday/bloom-comfyui:latest
          target: base
